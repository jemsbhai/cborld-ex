name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────
  # Run tests across all feature combinations on native target.
  # The test harness provides std, so even no_std library code
  # can have its unit tests run on native.
  # ─────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.features_label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - features_label: "std (default)"
            cargo_args: ""
          - features_label: "no_std bare"
            cargo_args: "--no-default-features"
          - features_label: "no_std + alloc"
            cargo_args: "--no-default-features --features alloc"
          - features_label: "no_std + digest"
            cargo_args: "--no-default-features --features digest"
          - features_label: "no_std + alloc + digest"
            cargo_args: "--no-default-features --features alloc,digest"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test ${{ matrix.cargo_args }}

  # ─────────────────────────────────────────────────────────────
  # Verify no_std compilation on wasm32-unknown-unknown.
  # Cannot run tests (no test runner for wasm32), but `cargo check`
  # proves the library compiles without std on a real no_std target.
  # This is the critical gate for ESP32-WASM and embedded use.
  # ─────────────────────────────────────────────────────────────
  no-std-check:
    name: no_std check (${{ matrix.features_label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - features_label: "bare"
            cargo_args: "--no-default-features"
          - features_label: "alloc"
            cargo_args: "--no-default-features --features alloc"
          - features_label: "digest"
            cargo_args: "--no-default-features --features digest"
          - features_label: "alloc + digest"
            cargo_args: "--no-default-features --features alloc,digest"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Check wasm32 compilation
        run: cargo check --target wasm32-unknown-unknown ${{ matrix.cargo_args }}

  # ─────────────────────────────────────────────────────────────
  # Clippy lint — all features enabled
  # ─────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (all features)
        run: cargo clippy --all-features -- -D warnings

  # ─────────────────────────────────────────────────────────────
  # Formatting check
  # ─────────────────────────────────────────────────────────────
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check
